<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>First Dates · Platform Walkthrough</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');
  :root{
    --ink:#23201c;--ink-soft:#5b554d;--cream:#f6f1e7;--cream-2:#efe7d8;--paper:#fffdf8;
    --accent:#b5532f;--accent-2:#2f6d6a;--gold:#c8943b;--line:#e2d8c5;--good:#2f6d6a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:#2b2722;-webkit-font-smoothing:antialiased;}
  .serif{font-family:'Fraunces',Georgia,serif;}

  .app{display:flex;min-height:100vh;}
  /* prototype sidebar */
  .side{width:248px;flex:none;background:#211d19;color:#d8cdb8;padding:22px 18px;overflow:auto;}
  .side .brand{font-family:'Fraunces',serif;font-weight:600;font-size:21px;letter-spacing:.16em;color:#fff;}
  .side .brand small{display:block;font-family:'Inter';font-weight:500;font-size:9px;letter-spacing:.22em;color:#9a8f78;text-transform:uppercase;margin-top:4px;}
  .side .kicker{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8a7f68;margin:26px 0 10px;}
  .grp{margin-bottom:16px;}
  .grp h4{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#b6a888;margin:0 0 8px;}
  .navitem{display:flex;gap:9px;align-items:center;padding:7px 9px;border-radius:8px;font-size:13px;color:#c8bca2;cursor:pointer;transition:.12s;}
  .navitem:hover{background:#2c281f;color:#fff;}
  .navitem.active{background:var(--accent);color:#fff;}
  .navitem .d{width:6px;height:6px;border-radius:50%;background:#5d5446;flex:none;}
  .navitem.active .d{background:#fff;}

  /* canvas */
  .canvas{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px 90px;position:relative;}
  .screenlabel{position:absolute;top:22px;left:0;right:0;text-align:center;color:#a99e86;font-size:12px;letter-spacing:.1em;}
  .screenlabel b{color:#f3ecdd;font-weight:600;}

  /* phone frame */
  .phone{
    width:380px;height:800px;max-height:82vh;border-radius:46px;background:#0e0c0a;
    padding:13px;box-shadow:0 40px 90px -30px rgba(0,0,0,.7), inset 0 0 0 2px #322c25;position:relative;
  }
  .screen{width:100%;height:100%;border-radius:34px;overflow:hidden;background:var(--cream);position:relative;display:flex;flex-direction:column;}
  .notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#0e0c0a;border-radius:0 0 16px 16px;z-index:20;}
  .statusbar{height:42px;flex:none;display:flex;align-items:flex-end;justify-content:space-between;padding:0 24px 6px;font-size:12px;font-weight:600;color:var(--ink);z-index:10;}
  .statusbar .r{display:flex;gap:5px;align-items:center;}
  .statusbar svg{display:block;}
  .scrollarea{flex:1;overflow:auto;}
  .scrollarea::-webkit-scrollbar{width:0;}

  /* desktop frame */
  .desktop{width:min(1080px,94vw);height:min(660px,80vh);border-radius:14px;background:#0e0c0a;padding:0;box-shadow:0 40px 90px -30px rgba(0,0,0,.7);overflow:hidden;display:flex;flex-direction:column;}
  .dtbar{height:38px;background:#1c1813;display:flex;align-items:center;gap:7px;padding:0 14px;flex:none;}
  .dtbar i{width:11px;height:11px;border-radius:50%;background:#4a4239;}
  .dtbar .url{margin-left:14px;background:#2a251f;color:#a99e86;font-size:11px;padding:5px 14px;border-radius:7px;flex:1;max-width:360px;}
  .dtscreen{flex:1;background:var(--cream);overflow:auto;}

  /* nav controls */
  .controls{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:10px;align-items:center;z-index:40;background:#211d19;border:1px solid #38312a;border-radius:999px;padding:8px 10px;}
  .controls button{cursor:pointer;border:none;background:#322c25;color:#e7ddca;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;font-family:'Inter';transition:.14s;}
  .controls button:hover{background:var(--accent);color:#fff;}
  .controls .count{color:#a99e86;font-size:12px;padding:0 8px;min-width:74px;text-align:center;}

  /* ====== in-product UI components ====== */
  .pad{padding:8px 26px 26px;}
  .center{display:flex;flex-direction:column;height:100%;}
  h1.t{font-family:'Fraunces',serif;font-weight:500;font-size:29px;line-height:1.12;margin:0 0 12px;letter-spacing:-.01em;}
  h2.t{font-family:'Fraunces',serif;font-weight:500;font-size:23px;line-height:1.15;margin:0 0 10px;}
  p.body{font-size:14.5px;line-height:1.55;color:var(--ink-soft);margin:0 0 14px;}
  .small{font-size:12px;color:var(--ink-soft);}
  .kicker2{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:12px;}

  .btn{display:block;width:100%;text-align:center;border:none;border-radius:999px;padding:15px;font-family:'Inter';font-size:15px;font-weight:600;cursor:pointer;}
  .btn-primary{background:var(--accent);color:#fff;box-shadow:0 12px 24px -12px rgba(181,83,47,.7);}
  .btn-soft{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
  .btn-dark{background:var(--ink);color:#fff;}
  .link{display:block;text-align:center;font-size:13.5px;color:var(--ink-soft);margin-top:14px;}
  .stack{display:flex;flex-direction:column;gap:11px;}

  .orb{width:120px;height:120px;border-radius:50%;position:relative;margin:0 auto;
    background:radial-gradient(circle at 32% 30%, #7fb7b2, var(--accent-2) 60%, #1f4e4b 100%);
    box-shadow:0 0 0 10px rgba(47,109,106,.1), inset 0 0 22px rgba(255,255,255,.25);animation:breathe 4s ease-in-out infinite;}
  .orb.sm{width:64px;height:64px;}
  .orb.sam{background:radial-gradient(circle at 32% 30%, #e7a98c, var(--accent) 60%, #7c3318 100%);box-shadow:0 0 0 10px rgba(181,83,47,.1), inset 0 0 22px rgba(255,255,255,.25);}
  .orb::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 65% 70%, rgba(255,255,255,.35), transparent 45%);}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.04);}}

  .field{border:1px solid var(--line);background:var(--paper);border-radius:12px;padding:13px 15px;margin-bottom:11px;}
  .field label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:5px;}
  .field .val{font-size:15px;color:var(--ink);}
  .field .val.ph{color:#b3a88f;}

  .choice{border:1px solid var(--line);background:var(--paper);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;}
  .choice.sel{border-color:var(--accent);background:#fff7f1;box-shadow:0 0 0 1px var(--accent) inset;}
  .choice .ic{width:38px;height:38px;border-radius:10px;background:var(--cream-2);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;}
  .choice h3{margin:0 0 2px;font-family:'Fraunces',serif;font-weight:500;font-size:16px;}
  .choice p{margin:0;font-size:12.5px;color:var(--ink-soft);}
  .choice .tick{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:none;}
  .choice.sel .tick{background:var(--accent);border-color:var(--accent);}

  .speechcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px 18px;margin:0 22px;}
  .speechcard .who{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-2);font-weight:600;margin-bottom:7px;}
  .speechcard p{margin:0;font-family:'Fraunces',serif;font-size:19px;line-height:1.32;}

  .micbtn{width:74px;height:74px;border-radius:50%;background:var(--accent);margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 30px -10px rgba(181,83,47,.7);}
  .micbtn.live{background:#fff;border:3px solid var(--accent);}
  .wave{display:flex;gap:4px;align-items:center;justify-content:center;height:30px;}
  .wave i{width:4px;border-radius:3px;background:var(--accent-2);animation:wv 1s ease-in-out infinite;}
  @keyframes wv{0%,100%{height:8px;}50%{height:26px;}}
  .bubble{background:var(--cream-2);border-radius:16px 16px 16px 5px;padding:13px 16px;font-size:14px;line-height:1.5;color:var(--ink);margin:0 22px;}

  .trait{margin-bottom:13px;}
  .trait .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .trait .top b{font-family:'Fraunces',serif;font-weight:500;font-size:14.5px;}
  .trait .top span{font-size:11.5px;color:var(--ink-soft);}
  .bar{height:8px;border-radius:6px;background:var(--cream-2);overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent-2),var(--gold));}
  .bar i.sam{background:linear-gradient(90deg,#b5532f,var(--gold));}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px;}
  .chip{font-size:11.5px;border:1px solid var(--line);border-radius:999px;padding:5px 11px;color:var(--ink-soft);background:var(--paper);}
  .echo{font-style:italic;font-family:'Fraunces',serif;font-size:15.5px;line-height:1.45;color:var(--ink);}
  /* qualitative portrait rows (no scale, nothing to game) */
  .qrow{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);align-items:baseline;}
  .qrow:last-child{border-bottom:none;}
  .qrow .qn{font-family:'Fraunces',serif;font-weight:500;font-size:15px;min-width:104px;flex:none;color:var(--ink);}
  .qrow .qp{font-size:13.5px;line-height:1.5;color:var(--ink-soft);}
  .qrow .qp em{font-style:normal;font-weight:600;}
  .qrow .qp .meet{color:var(--good);}
  .qrow .qp .tend{color:#a9762a;}
  .reading{display:flex;flex-direction:column;gap:2px;}
  .reading .rline{font-family:'Fraunces',serif;font-size:16px;color:var(--ink);padding:9px 0;border-bottom:1px solid var(--line);opacity:.9;}
  .reading .rline:last-child{border-bottom:none;}

  .tabbar{height:64px;flex:none;border-top:1px solid var(--line);background:var(--paper);display:flex;align-items:center;justify-content:space-around;padding-bottom:8px;}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#a99e86;}
  .tab.active{color:var(--accent);}
  .tab .ic{width:22px;height:22px;}

  .matchcard{border-radius:20px;overflow:hidden;border:1px solid var(--line);background:var(--paper);box-shadow:0 18px 40px -26px rgba(40,30,15,.5);}
  .matchphoto{height:300px;background:linear-gradient(160deg,#d9b8a4,#b5532f 75%);position:relative;display:flex;align-items:flex-end;}
  .matchphoto .sil{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .matchphoto .meta{position:relative;z-index:2;padding:18px 18px 16px;color:#fff;background:linear-gradient(transparent,rgba(60,25,10,.78));width:100%;}
  .matchphoto .meta h2{font-family:'Fraunces',serif;font-weight:500;font-size:24px;margin:0;}
  .matchphoto .meta p{margin:3px 0 0;font-size:13px;opacity:.92;}
  .signal{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-2);font-weight:600;}

  .ring{width:128px;height:128px;margin:0 auto;position:relative;}
  .ring svg{transform:rotate(-90deg);}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .num b{font-family:'Fraunces',serif;font-size:34px;line-height:1;}
  .ring .num span{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);}

  .twin{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .twin .tg{font-size:10px;color:var(--ink-soft);width:30px;}
  .twin .bar{flex:1;}
  .block{border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin:0 22px 12px;background:var(--paper);}
  .block h4{margin:0 0 5px;font-family:'Fraunces';font-weight:500;font-size:15px;}
  .block.good h4{color:var(--good);}.block.watch h4{color:#a9762a;}
  .block p{margin:0;font-size:13px;line-height:1.5;color:var(--ink-soft);}
  .block .q{margin-top:7px;font-style:italic;font-family:'Fraunces';font-size:13.5px;color:var(--ink);}

  /* desktop dashboard layout */
  .dash{display:grid;grid-template-columns:300px 1fr;gap:0;height:100%;}
  .dash .lcol{background:linear-gradient(170deg,#fffdf8,#f2ebdb);border-right:1px solid var(--line);padding:30px 26px;overflow:auto;}
  .dash .rcol{padding:30px 34px;overflow:auto;}
  .dash .dbrand{font-family:'Fraunces';font-weight:600;letter-spacing:.16em;font-size:18px;margin-bottom:26px;}
  .dash .dbrand small{display:block;font-size:8px;letter-spacing:.2em;color:var(--ink-soft);text-transform:uppercase;margin-top:3px;}
  .dash h1{font-family:'Fraunces';font-weight:500;font-size:27px;margin:0 0 6px;}
  .dnav{display:flex;gap:22px;border-bottom:1px solid var(--line);margin:18px 0 22px;}
  .dnav span{font-size:13px;color:var(--ink-soft);padding-bottom:10px;}
  .dnav span.on{color:var(--accent);border-bottom:2px solid var(--accent);font-weight:600;}
  .cols2{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
  .panel{border:1px solid var(--line);border-radius:14px;padding:18px 20px;background:var(--paper);}
  .panel h3{margin:0 0 12px;font-family:'Fraunces';font-weight:500;font-size:16px;}
  .narr{font-size:13.5px;line-height:1.6;color:var(--ink-soft);}
  .conv-item{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink-soft);}
  .conv-item:last-child{border-bottom:none;}
  .dot2{width:7px;height:7px;border-radius:50%;background:var(--accent-2);flex:none;}

  .stagerow{display:flex;gap:14px;align-items:flex-start;position:relative;padding-bottom:18px;}
  .stagerow .mk{width:16px;display:flex;flex-direction:column;align-items:center;flex:none;align-self:stretch;}
  .stagerow .mk .pt{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent-2);background:var(--paper);flex:none;}
  .stagerow.done .mk .pt{background:var(--accent-2);}
  .stagerow.now .mk .pt{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px rgba(181,83,47,.16);}
  .stagerow.next .mk .pt{border-color:var(--line);}
  .stagerow .mk .ln{width:2px;flex:1;background:var(--line);margin-top:3px;min-height:20px;}
  .stagerow:last-child .mk .ln{display:none;}
  .stagerow .body2 .lb{font-family:'Fraunces',serif;font-size:15.5px;color:var(--ink);line-height:1.25;}
  .stagerow.next .body2 .lb{color:var(--ink-soft);}
  .stagerow .body2 .tg{font-size:11px;letter-spacing:.04em;margin-top:2px;}
  .stagerow.done .body2 .tg{color:var(--good);}
  .stagerow.now .body2 .tg{color:var(--accent);font-weight:600;}
  .stagerow.next .body2 .tg{color:var(--ink-soft);}
  .tapcue{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:#211d19;color:#e7ddca;font-size:11px;letter-spacing:.07em;padding:7px 14px;border-radius:999px;z-index:45;pointer-events:none;animation:cuepulse 1.7s ease-in-out infinite;}
  @keyframes cuepulse{0%,100%{opacity:.4;}50%{opacity:.95;}}
  .clickable{cursor:pointer;}
  @media(max-width:880px){.side{display:none;}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand" style="letter-spacing:.04em;">First Dates<small>by The School of Life</small></div>
    <div class="kicker">Platform walkthrough</div>
    <div id="nav"></div>
  </aside>
  <main class="canvas">
    <div class="screenlabel" id="screenlabel"></div>
    <div id="frame"></div>
  </main>
</div>
<div class="controls">
  <button onclick="go(-1)">‹ Prev</button>
  <span class="count" id="count"></span>
  <button onclick="go(1)">Next ›</button>
</div>

<script>
const STATUS = `<div class="statusbar"><span>9:41</span><span class="r">
  <svg width="17" height="11" viewBox="0 0 17 11"><g fill="currentColor"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="6" rx="1"/><rect x="9" y="2.5" width="3" height="8.5" rx="1"/><rect x="13.5" y="0" width="3" height="11" rx="1"/></g></svg>
  <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor"><path d="M8 2.2c2 0 3.8.8 5.1 2l1.2-1.3A9 9 0 0 0 8 .3 9 9 0 0 0 1.7 2.9L3 4.2A7 7 0 0 1 8 2.2Z"/><path d="M8 5.4c1.1 0 2.1.4 2.8 1.2l1.2-1.3A6 6 0 0 0 8 3.6a6 6 0 0 0-4 1.7l1.2 1.3A4 4 0 0 1 8 5.4Z"/><circle cx="8" cy="9" r="1.6"/></svg>
  <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" fill="none" stroke="currentColor" opacity=".4"/><rect x="2" y="2" width="17" height="8" rx="1.5" fill="currentColor"/><rect x="23" y="3.5" width="2" height="5" rx="1" fill="currentColor" opacity=".5"/></svg>
</span></div>`;

const STATUS_LIGHT = STATUS.replace('class="statusbar"','class="statusbar" style="color:#fff"');

function tabbar(active){
  const items=[['Home','home'],['Matches','match'],['Profile','profile'],['Kin','kin']];
  const ic={
    home:'<path d="M3 11 12 3l9 8" /><path d="M5 10v10h14V10"/>',
    match:'<path d="M12 21s-7-4.6-9.3-9C1 8.8 2.4 5 6 5c2 0 3 1.2 4 2.5C11 6.2 12 5 14 5c3.6 0 5 3.8 3.3 7-2.3 4.4-9.3 9-9.3 9Z"/>',
    profile:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>',
    kin:'<circle cx="12" cy="12" r="9"/>'
  };
  return `<div class="tabbar">${items.map(([n,k])=>`
    <div class="tab ${k===active?'active':''}"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ic[k]}</svg>${n}</div>`).join('')}</div>`;
}

function trait(name,val,word){return `<div class="trait"><div class="top"><b>${name}</b><span>${word}</span></div><div class="bar"><i style="width:${val}%"></i></div></div>`;}
function quality(name,phrase){return `<div class="qrow"><div class="qn">${name}</div><div class="qp">${phrase}</div></div>`;}
function stage(label,tag,state){return `<div class="stagerow ${state}"><div class="mk"><div class="pt"></div><div class="ln"></div></div><div class="body2"><div class="lb">${label}</div><div class="tg">${tag}</div></div></div>`;}
function portrait(o){o=o||{};
  const sex=o.sex||'f';
  const skin=o.skin||(sex==='m'?'#e3b08a':'#f3cbac');
  const skinSh=o.skinSh||(sex==='m'?'#c5895f':'#dca682');
  const hair=o.hair||(sex==='m'?'#33271b':'#46291a');
  const shirt=o.shirt||(sex==='m'?'#3f5660':'#b0697a');
  const lip=o.lip||(sex==='m'?'#bd7e63':'#c4615f');
  const bg1=o.bg1||(sex==='m'?'#dde6e6':'#efdfce'), bg2=o.bg2||(sex==='m'?'#b9c6c7':'#d8b69b');
  const id=Math.random().toString(36).slice(2,8);
  const longHair = sex==='f' ? `<path d="M46 252c-2-80 8-130 18-152 6 28 14 44 36 44s30-16 36-44c10 22 20 72 18 152z" fill="${hair}"/>` : '';
  const frontHair = sex==='m'
    ? `<path d="M58 112c-3-34 20-54 42-54s45 20 42 54c-7-18-13-26-24-26-5 7-29 8-39 2-8 3-17 8-21 24z" fill="${hair}"/>`
    : `<path d="M55 118c-5-42 23-62 45-62s50 20 45 62c-3-24-7-32-12-37-9 12-20 16-37 16-7 5-15 3-21-2-11 7-16 13-20 23z" fill="${hair}"/>`;
  const lashes = sex==='f' ? `<path d="M75 115q9-6 18 -1M107 114q9-5 18 1" stroke="#2c1d12" stroke-width="2" fill="none" stroke-linecap="round"/>` : '';
  const stubble = sex==='m' ? `<path d="M66 130c4 22 17 34 34 34s30-12 34-34c-5 14-18 22-34 22s-29-8-34-22z" fill="${skinSh}" opacity=".3"/>` : '';
  const mouth = sex==='f'
    ? `<path d="M87 145q13 7 26 0q-13 11-26 0z" fill="${lip}"/>`
    : `<path d="M88 147q12 7 24 0" stroke="${lip}" stroke-width="3" fill="none" stroke-linecap="round"/>`;
  const blush = sex==='f' ? `<ellipse cx="74" cy="133" rx="8" ry="5" fill="#e58b7a" opacity=".22"/><ellipse cx="126" cy="133" rx="8" ry="5" fill="#e58b7a" opacity=".22"/>` : '';
  return `<svg viewBox="0 0 200 250" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="display:block">
    <defs>

/* ---------------- shell ---------------- */
let cur=0;
const frame=document.getElementById('frame');
const nav=document.getElementById('nav');

function buildNav(){
  const groups={};
  SCREENS.forEach((s,i)=>{(groups[s.sec]=groups[s.sec]||[]).push(i);});
  nav.innerHTML=Object.entries(groups).map(([sec,idxs])=>`
    <div class="grp"><h4>${sec}</h4>${idxs.map(i=>`<div class="navitem" data-i="${i}" onclick="jump(${i})"><span class="d"></span>${SCREENS[i].name}</div>`).join('')}</div>`).join('');
}
function renderFrame(){
  const s=SCREENS[cur];
  if(s.frame==='desktop'){
    frame.innerHTML=`<div class="desktop"><div class="dtbar"><i></i><i></i><i></i><div class="url">app.firstdates.life / profile</div></div><div class="dtscreen">${s.html}</div></div>`;
  } else {
    frame.innerHTML=`<div class="phone"><div class="notch"></div><div class="screen">${s.html}</div></div>`;
  }
  document.getElementById('count').textContent=`${cur+1} / ${SCREENS.length}`;
  document.getElementById('screenlabel').innerHTML=`${s.sec} &nbsp;·&nbsp; <b>${s.name}</b>`;
  document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('active',+n.dataset.i===cur));
  wireAdvance();
}

function wireAdvance(){
  const oldCue=document.querySelector('.tapcue'); if(oldCue) oldCue.remove();
  // each in-product control advances to the next screen
  frame.querySelectorAll('.btn,.choice,.matchcard,.micbtn,.tab').forEach(el=>{
    el.classList.add('clickable');
    el.addEventListener('click',e=>{ e.stopPropagation(); go(1); });
  });
  // screens with no primary button (and not the last screen): click anywhere continues
  if(!frame.querySelector('.btn') && cur < SCREENS.length-1){
    const sc=frame.querySelector('.screen,.dtscreen');
    if(sc){ sc.classList.add('clickable'); sc.addEventListener('click',()=>go(1)); }
    const cue=document.createElement('div'); cue.className='tapcue'; cue.textContent='click anywhere to continue ›';
    document.querySelector('.canvas').appendChild(cue);
  }
}
function go(d){ cur=Math.max(0,Math.min(SCREENS.length-1,cur+d)); renderFrame(); }
function jump(i){ cur=i; renderFrame(); }
window.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')go(1); if(e.key==='ArrowLeft')go(-1); });
buildNav(); renderFrame();
</script>
